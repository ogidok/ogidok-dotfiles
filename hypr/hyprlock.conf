general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 4
    noise = 0.02
    contrast = 1.1
    brightness = 0.8
    vibrancy = 0.2
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    color = rgba(220,220,255,0.95)

    position = 80, -120
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%a, %d %b')"
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    color = rgba(200,200,220,0.8)

    position = 85, -260
    halign = left
    valign = top
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    outer_color = rgba(150,150,255,0.3)
    inner_color = rgba(20,20,40,0.4)
    font_color = rgba(220,220,255,0.9)

    position = 90, -380
    halign = left
    valign = top
}

label {
    monitor =
    text = Digite su clae , problema con su clae?
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    color = rgba(200,200,220,0.7)

    position = 95, -460
    halign = left
    valign = top
}